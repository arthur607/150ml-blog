{{- $related := .Site.RegularPages.Related . | first 3 -}}
{{- with $related -}}
  <div class="hx:mt-16 hx:border-t hx:border-gray-200 hx:dark:border-neutral-800 hx:pt-8">
    <p class="hx:mb-6 hx:text-sm hx:font-semibold hx:tracking-tight hx:text-gray-900 hx:dark:text-slate-100">
      You might also like
    </p>
    <div class="hx:grid hx:grid-cols-1 hx:sm:grid-cols-2 hx:lg:grid-cols-3 hx:gap-4">
      {{- range . -}}
        <a
          href="{{ .RelPermalink }}"
          class="hx:block hx:rounded-lg hx:border hx:border-gray-200 hx:dark:border-neutral-700 hx:p-4 hx:no-underline hx:hover:border-primary-500 hx:transition-colors"
        >
          <p class="hx:font-semibold hx:text-sm hx:text-gray-900 hx:dark:text-slate-100 hx:mb-1">{{ .Title }}</p>
          <p class="hx:text-xs hx:text-gray-500 hx:dark:text-gray-400">{{ partial "utils/format-date" .Date }}</p>
          {{- with .Description }}
            <p class="hx:mt-2 hx:text-xs hx:text-gray-600 hx:dark:text-gray-300 hx:line-clamp-2">{{ . }}</p>
          {{- end }}
        </a>
      {{- end -}}
    </div>
  </div>
{{- end -}}
