# Hugo configuration file
baseURL: "https://arthur607.github.io/150ml-blog/"
languageCode: "en-US"
description: "150ml — a personal blog"
enableRobotsTXT: true
title: 150ml

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

taxonomies:
  tag: tags
  category: categories

related:
  includeNewer: true
  threshold: 20
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70
    - name: date
      weight: 10

menu:
  main:
    - name: About
      pageRef: /about
      weight: 1
    - name: Tags
      pageRef: /tags
      weight: 2
    - name: GitHub
      weight: 3
      url: "https://github.com/arthugarcia"
      params:
        icon: github
    - name: Search
      weight: 4
      params:
        type: search
    - name: Theme
      weight: 5
      params:
        type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
    toc:
      displayTags: true
