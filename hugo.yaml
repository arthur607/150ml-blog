# Hugo configuration file
baseURL: "https://grand-duckanoo-e8458d.netlify.app/"
languageCode: "pt-BR"
defaultContentLanguage: pt
description: "150ml — um blog pessoal"
enableRobotsTXT: true
title: 150ml
copyright: "© 2026 Arthur Garcia"

languages:
  pt:
    languageName: Português
    weight: 1
  en:
    languageName: English
    weight: 2

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

taxonomies:
  tag: tags
  category: categories

related:
  includeNewer: true
  threshold: 20
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70
    - name: date
      weight: 10

menu:
  main:
    - identifier: about
      pageRef: /about
      weight: 1
    - identifier: tags
      pageRef: /tags
      weight: 2
    - name: GitHub
      weight: 3
      url: "https://github.com/arthugarcia"
      params:
        icon: github
    - identifier: search
      weight: 4
      params:
        type: search
    - identifier: language
      weight: 5
      params:
        type: language-switcher
    - identifier: themeToggle
      weight: 6
      params:
        type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: false
    displayLanguageSwitcher: true

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
    toc:
      displayTags: true
